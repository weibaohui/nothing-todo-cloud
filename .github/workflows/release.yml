name: Build and Release

on:
  push:
    branches: ["main"]
    tags:
      - "v*"
  pull_request:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # 构建前端
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci --legacy-peer-deps
          npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # 交叉编译后端
  build:
    needs: build-frontend
    strategy:
      matrix:
        include:
          # Linux x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: true
            artifact: ntd-cloud-linux-x64
            bin: ntd-cloud-server
            name: ntd-cloud-server-linux-x64

          # Linux ARM64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: true
            artifact: ntd-cloud-linux-arm64
            bin: ntd-cloud-server
            name: ntd-cloud-server-linux-arm64

          # Windows x64
          - os: ubuntu-latest
            target: x86_64-pc-windows-gnu
            use-cross: true
            artifact: ntd-cloud-windows-x64
            bin: ntd-cloud-server.exe
            name: ntd-cloud-server.exe

          # macOS ARM64 (Apple Silicon)
          - os: macos-latest
            target: aarch64-apple-darwin
            use-cross: false
            artifact: ntd-cloud-darwin-arm64
            bin: ntd-cloud-server
            name: ntd-cloud-server-darwin-arm64

          # macOS x64 (Intel)
          - os: macos-latest
            target: x86_64-apple-darwin
            use-cross: false
            artifact: ntd-cloud-darwin-x64
            bin: ntd-cloud-server
            name: ntd-cloud-server-darwin-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Verify frontend dist
        run: ls -la frontend/dist/

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # 使用 cross 进行交叉编译（Linux 平台）
      - name: Install cross
        if: matrix.use-cross == true
        run: cargo install cross --locked

      # Linux 交叉编译
      - name: Build (cross)
        if: matrix.use-cross == true
        env:
          CROSS_CONTAINER_OPTS: "-v ${{ github.workspace }}/frontend/dist:/frontend/dist:ro -v ${{ github.workspace }}/.git:/project/.git:ro"
          GIT_DIR: /project/.git
        run: |
          cd backend
          cross build --release --target ${{ matrix.target }}

      # macOS 原生编译
      - name: Build (native)
        if: matrix.use-cross == false
        run: |
          cd backend
          cargo build --release --target ${{ matrix.target }}

      # 准备二进制文件
      - name: Prepare binary
        run: |
          mkdir -p dist
          cp backend/target/${{ matrix.target }}/release/${{ matrix.bin }} "dist/${{ matrix.name }}"
          chmod +x "dist/${{ matrix.name }}" || true

      # 上传 artifact
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.name }}

  # 创建 GitHub Release（仅 tag 触发）
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: ntd-cloud-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
