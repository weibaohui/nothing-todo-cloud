version: '3.8'

services:
  ntd-cloud:
    build: .
    container_name: ntd-cloud-server
    ports:
      - "8089:8089"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - RUST_LOG=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8089/health"]
      interval: 30s
      timeout: 10s
      retries: 3
